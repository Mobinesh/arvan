apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: super-application
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: gitops/application/applications
    repoURL: 'application/applications/app.yaml'
    targetRevision: HEAD
    directory:
      recurse: true
